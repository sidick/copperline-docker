name: Publish container image

# Manually-triggered build of a multi-arch (amd64 + arm64) image, pushed to the
# GitHub Container Registry (ghcr.io/<owner>/copperline). The actual build lives
# in the reusable _build-image.yml workflow.
on:
  workflow_dispatch:
    inputs:
      copperline_ref:
        description: "Copperline git ref to build (commit SHA, tag, or branch)"
        required: false
        default: bc5bcbf166432d4e2b0d3b2a468f4443eefe5f6a
      tag:
        description: "Image tag to publish (alongside a git-sha tag)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  meta:
    name: Derive tags and labels
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      # metadata-action lowercases the image name and emits standard OCI labels
      # (source, revision, created). These override the Dockerfile's own LABELs,
      # so the published image's revision reflects THIS repo's commit; the
      # Copperline ref that was built is recorded in the build-arg / build log.
      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/copperline
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=sha,format=long

  publish:
    name: Build and push
    needs: meta
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-image.yml
    with:
      copperline_ref: ${{ inputs.copperline_ref }}
      tags: ${{ needs.meta.outputs.tags }}
      labels: ${{ needs.meta.outputs.labels }}
