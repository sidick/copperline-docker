name: _build-image

# Reusable multi-arch build+push of the Copperline image to GHCR. Called by
# publish-image.yml (manual) and upstream-release.yml (daily release watcher)
# so the build definition lives in exactly one place. The caller computes the
# tags and labels (with docker/metadata-action) and passes them in.
on:
  workflow_call:
    inputs:
      copperline_ref:
        description: "Copperline git ref to build (commit SHA, tag, or branch)"
        required: true
        type: string
      tags:
        description: "Newline-separated full image refs to push"
        required: true
        type: string
      labels:
        description: "Newline-separated OCI labels to apply"
        required: false
        type: string
        default: ""
    outputs:
      digest:
        description: "Digest of the pushed multi-arch manifest"
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Needed so the arm64 runtime layer (a trivial mkdir/chown RUN) can run
      # under emulation. The heavy Rust build stage is pinned to $BUILDPLATFORM
      # in the Dockerfile, so it is not emulated.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            COPPERLINE_REF=${{ inputs.copperline_ref }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}
          # Cache the (expensive) Rust build across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the manifest list to just amd64 + arm64 (no extra
          # unknown/unknown provenance attestation entry).
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Published image"
            echo ''
            echo "Platforms: linux/amd64, linux/arm64"
            echo "Copperline ref: \`${{ inputs.copperline_ref }}\`"
            echo ''
            echo "Tags:"
            echo '```'
            echo "${{ inputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
