server {
    # Port 8080, not 80: the container runs nginx as a non-root user, which
    # cannot bind privileged ports (<1024).
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx's bundled mime.types already maps .wasm -> application/wasm and .js
    # -> application/javascript (relied on for the ES module import). Do NOT add
    # a `types { ... }` block here: it REPLACES the inherited map rather than
    # extending it, which would strip the html/js types and serve them as
    # application/octet-stream (breaking module loading). The location below is
    # a belt-and-braces fallback only for the wasm type, and does not clobber
    # any other mapping.
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/wasm application/javascript text/javascript text/css application/json;

    location / {
        try_files $uri $uri/ =404;
    }

    # User-mounted disks/ROMs (Docker VOLUME). autoindex gives a browsable
    # listing; being same-origin, the emulator's "DF0 from URL" button and the
    # ?df0=files/<name> page parameter can fetch these directly.
    location /files/ {
        autoindex on;
    }
}
